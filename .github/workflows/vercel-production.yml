name: Deploy docs to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Vercel CLI secrets
        id: vercel-secrets
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping CLI deploy. Configure VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID repository secrets to enable this workflow."
          fi

      - name: Install Vercel CLI
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: npm install --global vercel@49.1.1

      - name: Pull Vercel project settings
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build production output
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy production output
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
